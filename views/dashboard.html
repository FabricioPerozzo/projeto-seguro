<!doctype html>
<html lang="pt-BR">
    <head>
        <title>Dashboard</title>
        <link rel="stylesheet" href="/style.css" />
        <style>
            .container {
                width: 400px;
            }
            .todo-form {
                display: flex;
                gap: 8px;
                margin: 16px 0;
            }
            .todo-form input {
                flex: 1;
                margin: 0;
            }
            .todo-form button {
                width: auto;
                padding: 10px 16px;
            }
            .todo-list {
                list-style: none;
                padding: 0;
                margin: 0;
                text-align: left;
            }
            .todo-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 8px 0;
                border-bottom: 1px solid #eee;
            }
            .todo-item.done span {
                text-decoration: line-through;
                color: #999;
            }
            .todo-item span {
                flex: 1;
                word-break: break-word;
            }
            .todo-item input[type='checkbox'] {
                width: auto;
                margin: 0;
            }
            .btn-delete {
                background: none;
                border: none;
                color: #e74c3c;
                cursor: pointer;
                font-size: 16px;
                padding: 0 4px;
                width: auto;
            }
            .empty {
                color: #999;
                font-size: 14px;
                margin: 16px 0;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2 id="titulo"></h2>
            <p id="email"></p>

            <div class="todo-form">
                <input type="text" id="todoInput" placeholder="Nova tarefa" />
                <button id="addBtn">+</button>
            </div>

            <ul class="todo-list" id="todoList"></ul>
            <p class="empty" id="emptyMsg">Nenhuma tarefa</p>

            <form action="/logout" method="POST">
                <button
                    type="submit"
                    style="
                        background: none;
                        border: none;
                        color: #4facfe;
                        cursor: pointer;
                        font-size: 16px;
                        padding: 0;
                        margin-top: 10px;
                    "
                >
                    Sair
                </button>
            </form>
        </div>

        <script src="/dashboard.js"></script>
    </body>
</html>
